server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: ErpPgSql$w32NM2024
    url: jdbc:postgresql://47.94.201.180:22020/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 47.94.201.180 # 地址
      port: 3202 # 端口
      database: 6 # 数据库索引
      password: Alax0518$%QvodteERb1940 # 密码，建议生产环境开启

  rabbitmq:
    host: 47.94.201.180 # RabbitMQ 服务的地址
    port: 5672 # RabbitMQ 服务的端口
    username: qvodte # RabbitMQ 服务的账号
    password: Alax2156MqNM1951 # RabbitMQ 服务的密码
    publisher-confirm-type: correlated
    publisher-returns: true  #支持发布返回
    listener:
      simple:
        acknowledge-mode: auto #自动应答，异常时触发重试
        concurrency: 1 #指定最小的消费者数量
        max-concurrency: 3 #指定最大的消费者数量
        retry:
          enabled: true #是否支持重试

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  keyword:
    type: none  # 可选 none / es
    es:
      uris: http://127.0.0.1:9200
      index: rag_keyword_store  # 全库共享索引，按 collection_name 字段区分知识库
      analyzer: ik_max_word
      search-analyzer: ik_smart

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rerank:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 10
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
        candidate-budget: 100
      intent-directed:
        enabled: true
        min-intent-score: 0.4
        top-k-multiplier: 2
      keyword:
        enabled: true
        mode: both
        top-k-multiplier: 2
    fusion:
      strategy: rrf
      rrf-k: 60
      rerank-candidate-limit: 50  # RRF 融合后送入 Rerank 的候选上限，<=0 不截断（经验值 40~100）

  trace:
    enabled: true
    max-error-length: 1000

  # 图片解析（图生文）配置
  # 产出一段自包含的知识文本：既说清"图是什么"，又完整保留所有文字与层级
  image-parse:
    description-prompt: |-
      请把这张图片的内容转写成一段自包含的知识文本，用于知识库检索与问答，不要描述颜色、布局、字体等视觉样式。要求：
      1. 开头用一两句话说明这张图是什么（主题、类型、用途），让人不看图也能明白讲的是什么。
      2. 随后按图中的分组、层级、流程关系，完整转写所有文字内容（OCR），保留每个分组标题与其下属条目的归属关系，不要遗漏任何文字。
      3. 若是图表、架构图或流程图，请补充说明各部分之间的关系（如包含、调用、先后顺序），而不只是罗列文字。
      4. 保持术语准确完整，表述贴近用户可能的提问方式。
      5. 最后另起一行，用一句话自然引出图片（例如"下方为该内容对应的原始图片："），以便在这段文字后紧接着展示图片。
    max-output-tokens: 4096

